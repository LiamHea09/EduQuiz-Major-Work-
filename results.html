{% extends 'base.html' %}

{% block title %}Login {% endblock %}

{% block content %}

<h1>Login</h1>

<div class="Message">
<!-- taken from Assessment Task 1 -->
  {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      {{ message }}
    {% endfor %}
  {% endif %}
{% endwith %}
</div>

<div class= User>
    <form action = "/login" method = "POST">
    <input type="text" id "Username" name="Username" placeholder="Username:" required><br>
    <input type="password" id="Pass" name="Password" placeholder="Enter your password:" required><br>
    <input type="submit" class="Register_Button"><br>
    </form>
</div>
<a href="/register" class="Register_Button"> Register Page</a>
{% endblock %}
